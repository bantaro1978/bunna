<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ブンナよ、木を登ってけ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* スマホでの誤ダブルタップズームなどを防止 */
        }

        body {
            background-color: #2e4620;
            background-image: linear-gradient(135deg, #2e4620 25%, #1c3110 100%);
            font-family: 'DotGothic16', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            padding: 10px;
        }

        #ui-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 6px;
            text-align: center;
        }

        h1 {
            font-size: 1.3rem;
            color: #9bf6ff;
            text-shadow: 2px 2px #000;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        #score-board {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 12px;
            border-radius: 4px;
            border: 2px solid #5a8f35;
            font-size: 1rem;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 400 / 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            background-color: #f0f0f0;
            display: block;
            width: 100%;
            height: 100%;
            border: 4px solid #333;
            border-radius: 8px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .overlay h2 {
            font-size: 1.8rem;
            color: #ffadad;
            margin-bottom: 12px;
            text-shadow: 3px 3px #000;
        }

        .overlay p {
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: #e2e2e2;
            line-height: 1.6;
        }

        .btn {
            font-family: 'DotGothic16', sans-serif;
            font-size: 1.3rem;
            padding: 12px 28px;
            background: #5a8f35;
            color: white;
            border: 3px solid #fff;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px #2e4620;
            transition: transform 0.1s;
            position: relative;
            z-index: 20;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px #2e4620;
        }

        #footer-instruction {
            margin-top: 6px;
            font-size: 0.85rem;
            color: #a3b899;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>ブンナよ、木を登ってけ</h1>
        <div id="score-board">
            <div>階層: <span id="current-score">0</span>F</div>
            <div>最高: <span id="high-score">0</span>F</div>
        </div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="start-overlay" class="overlay">
            <h2 style="color: #ffd166;">木を登れ！</h2>
            <p>ブンナはゆっくり左右に動きます。<br>画面長押し（またはスペースキー）でパワーを溜め、離して大ジャンプ！<br><br><span style="color:#ffd166; font-weight:bold;">【解放】1階からエレベーター床・コンベヤー・ジャンプ台がフルスピードで大出現！</span><br><br>上からたまに降る障害物に気をつけて登れ！</p>
            <button class="btn" id="start-btn" onclick="startGame(event)" ontouchstart="startGame(event)">ゲームスタート</button>
        </div>

        <div id="gameover-overlay" class="overlay" style="display: none;">
            <h2 id="gameover-title">落下してしまった！</h2>
            <p style="font-size: 1.4rem;">記録: <span id="final-score" style="color:#ffd166; font-weight:bold;">0</span> 階</p>
            <p id="bird-comment" style="font-size: 0.9rem; color:#ffadad; margin-bottom: 16px;"></p>
            <button class="btn" id="restart-btn" onclick="restartGame(event)" ontouchstart="restartGame(event)">もう一度遊ぶ</button>
        </div>
    </div>

    <div id="footer-instruction">
        [操作方法] 画面を長押しして離す / スペースキー
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const startOverlay = document.getElementById('start-overlay');
const gameoverOverlay = document.getElementById('gameover-overlay');
const currentScoreElement = document.getElementById('current-score');
const highScoreElement = document.getElementById('high-score');
const finalScoreElement = document.getElementById('final-score');
const birdCommentElement = document.getElementById('bird-comment');
const gameoverTitle = document.getElementById('gameover-title');

// ゲーム状態管理
let gameState = 'START';
let score = 0;
let highScore = localStorage.getItem('bunna_highscore_v6') || 0;
highScoreElement.textContent = highScore;

// 定数・ゲーム設定
const CANVAS_WIDTH = 400;
const CANVAS_HEIGHT = 600;
const GRAVITY = 0.43; 

const MIN_JUMP_FORCE = -5.8;
const MAX_JUMP_FORCE = -12.5;
const SPRING_JUMP_FORCE = -15.5; 
const POWER_CHARGE_SPEED = 0.03; 

let cameraY = 0;
let targetCameraY = 0;

// プレイヤー（カエルのブンナ）
const player = {
    x: 180,
    y: 480,
    width: 28,   
    height: 24,
    vx: 1.8,     
    vy: 0,
    direction: 1, 
    isGrounded: false,
    hopTimer: 0,  
    isCharging: false,
    jumpPower: 0,
    ridingPlatform: null,
    isStunned: false 
};

let platforms = [];
const PLATFORM_HEIGHT = 14;
let backgroundObjects = [];

let fallingHazards = [];
let hazardSpawnTimer = 0;

const birds = [
    { name: 'トビ', emoji: '🦅', text: '「上には上がいるぞ、もっと羽ばたけ！」' },
    { name: 'モズ', emoji: '🐦', text: '「キチキチキチ！その程度でへばるのかい？」' },
    { name: 'フクロウ', emoji: '🦉', text: '「ホゥホゥ、焦らずとも木はまだ高いぞ。」' },
    { name: 'ヘビ', emoji: '🐍', text: '「ふふ、下に落ちてくるのを待っているよ…」' },
    { name: 'ツグミ', emoji: '𓅭', text: '「広い世界を知ることは、とても素晴らしいことよ。」' },
    { name: 'スズメ', emoji: '🐤', text: '「欲張って高いところばかり見ていると、足元をすくわれるよ！」' },
    { name: '子ねずみ', emoji: '🐭', text: '「地上にもボクたちのあたたかい暮らしがあるんだよ…！シブがきもあるしね。」' },
    { name: 'ウシガエル', emoji: '🐸', text: '「ガアガア！偉そうに威張ってみたところで、俺たちもただの小さな命さ。」' },
    { name: 'ツチガエル', emoji: '🐸', text: '「泥にまみれて、泥付きのイモを食う。それが土に生きるってことよ。」' }
];

function startGame(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (gameState === 'START') {
        startOverlay.style.display = 'none';
        gameState = 'PLAYING';
        initGame();
    }
}

function restartGame(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (gameState === 'GAMEOVER') {
        gameoverOverlay.style.display = 'none';
        gameState = 'PLAYING';
        initGame();
    }
}

function initGame() {
    score = 0;
    cameraY = 0;
    targetCameraY = 0;
    hazardSpawnTimer = 0;
    currentScoreElement.textContent = score;
    
    player.x = 180;
    player.y = 500;
    player.vy = 0;
    player.direction = 1;
    player.isGrounded = true;
    player.isCharging = false;
    player.jumpPower = 0;
    player.ridingPlatform = null;
    player.isStunned = false;

    platforms = [];
    fallingHazards = [];
    
    // 最初の大ベース床
    platforms.push({ x: 0, y: 540, width: CANVAS_WIDTH, type: 'normal' });

    // 初期足場の生成
    for (let i = 0; i < 20; i++) {
        generatePlatform(460 - (i * 54)); 
    }

    backgroundObjects = [];
    for (let i = 0; i < 15; i++) {
        generateBackgroundObject(CANVAS_HEIGHT - (i * 100));
    }
}

function generatePlatform(targetY) {
    let minWidth, maxWidth;
    if (score < 8) {
        minWidth = 180;
        maxWidth = 240;
    } else if (score < 18) {
        minWidth = 110;
        maxWidth = 160;
    } else {
        minWidth = 65;
        maxWidth = 100;
    }

    const width = Math.max(55, maxWidth - Math.floor(Math.random() * (maxWidth - minWidth)));
    const x = Math.random() * (CANVAS_WIDTH - width);
    
    // ★1Fからすべての特殊床が超高確率で完全ランダム抽選されるように大改造ケロ！
    let type = 'normal';
    const rand = Math.random();
    
    if (rand < 0.20) {
        type = 'moving';          // 左右移動床 (20%)
    } else if (rand < 0.40) {
        type = 'moving-vertical'; // 上下移動床 (20%)
    } else if (rand < 0.60) {
        type = 'spring';          // ジャンプ台 (20%)
    } else if (rand < 0.80) {
        type = 'conveyor-left';   // 左ベルトコンベヤー (20%)
    } else if (rand < 1.00) {
        type = 'conveyor-right';  // 右ベルトコンベヤー (20%)
    }

    platforms.push({
        x: x,
        y: targetY,
        width: width,
        type: type,
        moveRange: 50,
        startX: x,
        moveSpeed: 0.9 + Math.random() * 1.1,
        dir: Math.random() > 0.5 ? 1 : -1,
        startY: targetY,
        verticalRange: 42,
        verticalSpeed: 0.7 + Math.random() * 0.7,
        vDir: Math.random() > 0.5 ? 1 : -1,
        conveyorSpeed: 1.4 
    });
}

function spawnHazard() {
    const types = ['stone', 'leaf', 'mud'];
    const type = types[Math.floor(Math.random() * types.length)];
    
    const x = Math.random() * (CANVAS_WIDTH - 40) + 20;
    const y = cameraY - 40; 
    
    let speed = 1.2 + Math.random() * 1.0;
    let size = 11 + Math.random() * 6;
    
    speed += Math.min(score * 0.02, 1.5);

    fallingHazards.push({ x, y, type, speed, size, rotation: Math.random() * Math.PI });
}

function generateBackgroundObject(targetY) {
    const rand = Math.random();
    if (rand < 0.18) {
        const birdData = birds[Math.floor(Math.random() * birds.length)];
        backgroundObjects.push({
            x: Math.random() * (CANVAS_WIDTH - 40),
            y: targetY,
            type: 'bird',
            emoji: birdData.emoji,
            size: 22 + Math.random() * 8
        });
    } else if (rand < 0.45) {
        backgroundObjects.push({
            x: Math.random() * CANVAS_WIDTH - 60,
            y: targetY,
            type: 'cloud',
            width: 60 + Math.random() * 40,
            speed: 0.1 + Math.random() * 0.2
        });
    } else {
        backgroundObjects.push({
            x: Math.random() > 0.5 ? 10 : CANVAS_WIDTH - 35,
            y: targetY,
            type: 'leaf',
            size: 15 + Math.random() * 15
        });
    }
}

function startCharging() {
    if (gameState === 'PLAYING' && player.isGrounded && !player.isCharging && !player.isStunned) {
        player.isCharging = true;
        player.jumpPower = 0;
    }
}

function releaseCharging() {
    if (gameState === 'PLAYING' && player.isCharging && !player.isStunned) {
        executeJump();
    }
}

function executeJump() {
    const finalJumpForce = MIN_JUMP_FORCE + (MAX_JUMP_FORCE - MIN_JUMP_FORCE) * player.jumpPower;
    player.vy = finalJumpForce;
    player.isGrounded = false;
    player.isCharging = false;
    player.jumpPower = 0;
    player.ridingPlatform = null;
}

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); startCharging(); }
});
window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') { e.preventDefault(); releaseCharging(); }
});
window.addEventListener('touchstart', (e) => {
    if (gameState !== 'PLAYING') return; 
    e.preventDefault();
    startCharging();
}, { passive: false });
window.addEventListener('touchend', (e) => {
    if (gameState !== 'PLAYING') return;
    e.preventDefault();
    releaseCharging();
}, { passive: false });

function update() {
    if (gameState !== 'PLAYING') return;

    hazardSpawnTimer++;
    const spawnInterval = Math.max(180, 300 - Math.floor(score * 2));
    if (hazardSpawnTimer >= spawnInterval) {
        hazardSpawnTimer = 0;
        spawnHazard();
    }

    fallingHazards.forEach(hz => {
        hz.y += hz.speed;
        hz.rotation += 0.02; 

        if (!player.isStunned &&
            hz.x + hz.size > player.x &&
            hz.x - hz.size < player.x + player.width &&
            hz.y + hz.size > player.y &&
            hz.y - hz.size < player.y + player.height) {
            
            player.isStunned = true;
            player.isCharging = false;
            player.vy = 1.5; 
            player.isGrounded = false;
        }
    });

    fallingHazards = fallingHazards.filter(hz => hz.y < cameraY + CANVAS_HEIGHT + 50);

    platforms.forEach(plat => {
        if (plat.type === 'moving') {
            plat.x += plat.moveSpeed * plat.dir;
            if (plat.x < plat.startX - plat.moveRange || plat.x + plat.width > CANVAS_WIDTH) {
                plat.dir *= -1;
            }
        } else if (plat.type === 'moving-vertical') {
            plat.y += plat.verticalSpeed * plat.vDir;
            if (plat.y < plat.startY - plat.verticalRange || plat.y > plat.startY + plat.verticalRange) {
                plat.vDir *= -1;
            }
        }
    });

    if (player.isStunned) {
        player.vy += GRAVITY;
        player.y += player.vy;
    } else {
        if (player.isCharging && player.isGrounded) {
            player.jumpPower += POWER_CHARGE_SPEED;
            if (player.jumpPower >= 1.0) {
                player.jumpPower = 1.0;
                executeJump(); 
            }
        }

        player.x += player.vx * player.direction;
        
        if (player.isGrounded && player.ridingPlatform) {
            if (player.ridingPlatform.type === 'conveyor-left') {
                player.x -= player.ridingPlatform.conveyorSpeed;
            } else if (player.ridingPlatform.type === 'conveyor-right') {
                player.x += player.ridingPlatform.conveyorSpeed;
            } else if (player.ridingPlatform.type === 'moving') {
                player.x += player.ridingPlatform.moveSpeed * player.ridingPlatform.dir;
            } else if (player.ridingPlatform.type === 'moving-vertical') {
                player.y += player.ridingPlatform.verticalSpeed * player.ridingPlatform.vDir;
            }
        }
        
        if (player.x <= 0) { player.x = 0; player.direction = 1; }
        else if (player.x + player.width >= CANVAS_WIDTH) { player.x = CANVAS_WIDTH - player.width; player.direction = -1; }

        player.vy += GRAVITY;
        player.y += player.vy;
        player.hopTimer += 0.15;

        player.isGrounded = false;
        if (player.vy >= 0) {
            for (let plat of platforms) {
                if (
                    player.x + player.width > plat.x &&
                    player.x < plat.x + plat.width &&
                    player.y + player.height >= plat.y &&
                    player.y + player.height - player.vy <= plat.y + 8
                ) {
                    if (plat.type === 'spring') {
                        player.vy = SPRING_JUMP_FORCE; 
                        player.isGrounded = false;
                        player.isCharging = false;
                        player.ridingPlatform = null;
                    } else {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                        player.ridingPlatform = plat; 
                    }
                    break;
                }
            }
        }
    }

    if (player.y < cameraY + 250 && !player.isStunned) {
        targetCameraY = player.y - 250;
    }
    cameraY += (targetCameraY - cameraY) * 0.1;

    backgroundObjects.forEach(obj => {
        if (obj.type === 'cloud') {
            obj.x += obj.speed;
            if (obj.x > CANVAS_WIDTH) obj.x = -obj.width;
        }
    });

    let highestPlatY = platforms.reduce((min, p) => p.y < min ? p.y : min, CANVAS_HEIGHT);
    while (highestPlatY > cameraY - 300) {
        highestPlatY = platforms.reduce((min, p) => p.y < min ? p.y : min, CANVAS_HEIGHT);
        const nextY = highestPlatY - 54; 
        generatePlatform(nextY);
        generateBackgroundObject(nextY);
        highestPlatY = nextY;
    }

    platforms = platforms.filter(p => p.y < cameraY + CANVAS_HEIGHT + 100);
    backgroundObjects = backgroundObjects.filter(o => o.y < cameraY + CANVAS_HEIGHT + 100);

    if (player.y > cameraY + CANVAS_HEIGHT) {
        gameOver();
    }

    if (!player.isStunned) {
        const calculatedScore = Math.floor((500 - player.y) / 54);
        if (calculatedScore > score) {
            score = calculatedScore;
            currentScoreElement.textContent = score;
        }
    }
}

function gameOver() {
    gameState = 'GAMEOVER';
    finalScoreElement.textContent = score;

    if (player.isStunned) {
        gameoverTitle.textContent = "障害物に直撃した！";
    } else {
        gameoverTitle.textContent = "足を踏み外した！";
    }

    if (score > highScore) {
        highScore = score;
        localStorage.setItem('bunna_highscore_v6', highScore);
        highScoreElement.textContent = highScore;
    }

    const randomBird = birds[Math.floor(Math.random() * birds.length)];
    birdCommentElement.innerHTML = `${randomBird.emoji} ${randomBird.name}の言葉:<br>${randomBird.text}`;

    gameoverOverlay.style.display = 'flex';
}

function draw() {
    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    ctx.save();
    ctx.translate(0, -cameraY);

    let bgGradient = ctx.createLinearGradient(0, cameraY, 0, cameraY + CANVAS_HEIGHT);
    if (score < 20) {
        bgGradient.addColorStop(0, '#e8f5e9');
        bgGradient.addColorStop(1, '#c8e6c9');
    } else if (score < 50) {
        bgGradient.addColorStop(0, '#bbdefb');
        bgGradient.addColorStop(1, '#e8f5e9');
    } else {
        bgGradient.addColorStop(0, '#0d47a1');
        bgGradient.addColorStop(1, '#90caf9');
    }
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, cameraY, CANVAS_WIDTH, CANVAS_HEIGHT);

    ctx.fillStyle = '#6d4c41';
    ctx.fillRect(CANVAS_WIDTH / 2 - 40, cameraY - 100, 80, CANVAS_HEIGHT + 200);
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(CANVAS_WIDTH / 2 - 10, cameraY - 100, 20, CANVAS_HEIGHT + 200);

    backgroundObjects.forEach(obj => {
        if (obj.type === 'bird') {
            ctx.font = `${obj.size}px Arial`;
            ctx.fillText(obj.emoji, obj.x, obj.y);
        } else if (obj.type === 'cloud') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.width * 0.3, 0, Math.PI * 2);
            ctx.arc(obj.x + obj.width * 0.25, obj.y - obj.width * 0.1, obj.width * 0.3, 0, Math.PI * 2);
            ctx.arc(obj.x + obj.width * 0.5, obj.y, obj.width * 0.25, 0, Math.PI * 2);
            ctx.fill();
        } else if (obj.type === 'leaf') {
            ctx.fillStyle = '#2e7d32';
            ctx.beginPath();
            ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    platforms.forEach(plat => {
        if (plat.type.startsWith('conveyor')) {
            ctx.fillStyle = '#b0bec5';
            ctx.strokeStyle = '#37474f';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(plat.x, plat.y, plat.width, PLATFORM_HEIGHT, 4);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#546e7a';
            ctx.font = 'bold 10px Arial';
            let arrows = plat.type === 'conveyor-left' ? "<<<<<<<<<<<<" : ">>>>>>>>>>>>";
            ctx.fillText(arrows.substring(0, Math.floor(plat.width / 7)), plat.x + 4, plat.y + 11);
        } else if (plat.type === 'spring') {
            ctx.fillStyle = '#1b5e20';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(plat.x, plat.y, plat.width, PLATFORM_HEIGHT, 4);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#ccff90';
            const stripeCount = Math.floor(plat.width / 12);
            for (let j = 0; j < stripeCount; j++) {
                if (j % 2 === 0) {
                    ctx.fillRect(plat.x + 4 + (j * 12), plat.y + 2, 8, PLATFORM_HEIGHT - 4);
                }
            }
        } else {
            ctx.fillStyle = plat.type === 'moving' ? '#d84315' : (plat.type === 'moving-vertical' ? '#af895f' : '#8d6e63');
            ctx.strokeStyle = '#4e342e';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(plat.x, plat.y, plat.width, PLATFORM_HEIGHT, 4);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = (plat.type === 'moving' || plat.type === 'moving-vertical') ? '#ffd54f' : '#4caf50';
            ctx.beginPath();
            ctx.arc(plat.x + 6, plat.y + 3, 4, 0, Math.PI * 2);
            ctx.arc(plat.x + plat.width - 6, plat.y + 3, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    fallingHazards.forEach(hz => {
        ctx.save();
        ctx.translate(hz.x, hz.y);
        ctx.rotate(hz.rotation);

        if (hz.type === 'stone') {
            ctx.fillStyle = '#78909c';
            ctx.strokeStyle = '#37474f';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, hz.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#cfd8dc';
            ctx.fillRect(-hz.size/3, -hz.size/3, hz.size/3, hz.size/3);
        } else if (hz.type === 'leaf') {
            ctx.fillStyle = '#a1887f'; 
            ctx.strokeStyle = '#4e342e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(0, 0, hz.size * 1.3, hz.size * 0.7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        } else if (hz.type === 'mud') {
            ctx.fillStyle = '#8d6e63';
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(-hz.size, -hz.size, hz.size * 2, hz.size * 2, 4);
            ctx.fill();
            ctx.stroke();
        }
        ctx.restore();
    });

    ctx.save();
    ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
    if (player.direction === -1 && !player.isStunned) ctx.scale(-1, 1);

    let scaleY = 1;
    let scaleX = 1;
    if (player.isCharging && player.isGrounded) {
        scaleY = 1 - (player.jumpPower * 0.35); 
        scaleX = 1 + (player.jumpPower * 0.15);
    } else if (!player.isGrounded) {
        scaleY = player.vy < 0 ? 1.2 : 0.9;      
    }
    if (player.isStunned) {
        ctx.rotate(player.hopTimer * 0.5);
    } else {
        ctx.scale(scaleX, scaleY);
    }

    const legCycle = Math.sin(player.hopTimer) * 3;
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#1b5e20';

    ctx.fillStyle = '#388e3c';
    ctx.beginPath();
    ctx.ellipse(-8, 6 + (player.isGrounded ? legCycle * 0.5 : 0), 5, 6, Math.PI/4, 0, Math.PI*2);
    ctx.ellipse(5, 6 + (player.isGrounded ? -legCycle * 0.5 : 0), 5, 6, -Math.PI/4, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#4caf50';
    ctx.beginPath();
    ctx.ellipse(0, 0, player.width / 2, player.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#4caf50';
    ctx.beginPath();
    if (!player.isGrounded || player.isStunned) {
        ctx.arc(-10, -5, 3, 0, Math.PI*2);
        ctx.arc(10, -5, 3, 0, Math.PI*2);
    } else {
        ctx.arc(-8 + legCycle, 8, 3, 0, Math.PI*2);
        ctx.arc(2 - legCycle, 8, 3, 0, Math.PI*2);
    }
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-6, -11, 4.5, 0, Math.PI * 2);
    ctx.arc(5, -11, 4.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    if (player.isStunned) {
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(-8, -13); ctx.lineTo(-4, -9); ctx.moveTo(-4, -13); ctx.lineTo(-8, -9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(3, -13); ctx.lineTo(7, -9); ctx.moveTo(7, -13); ctx.lineTo(3, -9); ctx.stroke();
    } else {
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-5, -11, 2, 0, Math.PI * 2);
        ctx.arc(6, -11, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = '#ff8fa3';
    ctx.beginPath();
    ctx.arc(-8, -3, 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
    ctx.restore(); 

    if (gameState === 'PLAYING') {
        const gaugeX = 20;
        const gaugeY = 20;
        const gaugeWidth = 130;
        const gaugeHeight = 14;

        ctx.fillStyle = '#4cc9f0';
        ctx.font = 'italic bold 11px "DotGothic16"';
        ctx.fillText('POWER', gaugeX, gaugeY - 4);

        ctx.fillStyle = '#000';
        ctx.fillRect(gaugeX, gaugeY, gaugeWidth, gaugeHeight);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(gaugeX, gaugeY, gaugeWidth, gaugeHeight);

        const maxBlocks = 12;
        const currentBlocks = Math.ceil(player.jumpPower * maxBlocks);
        const blockWidth = (gaugeWidth - 4) / maxBlocks;
        
        for (let i = 0; i < currentBlocks; i++) {
            ctx.fillStyle = `rgb(${i * 20}, 100, 255)`;
            ctx.fillRect(
                gaugeX + 2 + (i * blockWidth), 
                gaugeY + 2, 
                blockWidth - 1, 
                gaugeHeight - 4
            );
        }
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
